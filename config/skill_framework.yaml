# SKILL Narrative Literacy Framework
# Objectives used to guide scene generation and error detection

framework:
  name: SKILL
  version: "1.0"
  target_age_range: "7-11"

objectives:
  descriptive_adjectives:
    label: Descriptive Adjectives
    description: >
      Use rich, specific adjectives to describe entities
      (color, size, texture, shape, state).
    error_types:
      - PROPERTY_COLOR
      - PROPERTY_SIZE
      - PROPERTY_WEIGHT
      - PROPERTY_TEMPERATURE
      - PROPERTY_STATE
    scaffolding_animations:
      - color_pop
      - scale_strain
      - weight_response
      - emanation
      - physiological_tell

  spatial_prepositions:
    label: Spatial Prepositions
    description: >
      Accurately describe positions and spatial relationships
      between entities (on, under, behind, next to, between).
    error_types:
      - SPATIAL
      - RELATIONAL
    scaffolding_animations:
      - transparency_reveal
      - settle
      - drift
      - comparison_slide

  temporal_sequences:
    label: Temporal Sequences
    description: >
      Use correct tense and temporal markers to sequence events
      (before, after, while, then, first, next, finally).
    error_types:
      - TEMPORAL
    scaffolding_animations:
      - afterimage_rewind
      - anticipation_hold
      - melting
      - leaking

  quantity:
    label: Quantity & Pluralization
    description: >
      Correctly express quantity, pluralization, and
      numerical references (one vs many, singular vs plural).
    error_types:
      - QUANTITY
    scaffolding_animations:
      - sequential_pulse
      - isolation
      - domino_effect

  action_verbs:
    label: Action Verbs
    description: >
      Use precise, varied action verbs to describe character
      behaviors and movements (hop, creep, soar vs generic go, do).
    error_types:
      - ACTION
      - MANNER
    scaffolding_animations:
      - characteristic_action
      - motion_line
      - speed_warp

session_defaults:
  min_coverage: 0.7
  max_scenes: 8
  scene_progress_threshold: 0.75
  hesitation_timeout_s: 10
