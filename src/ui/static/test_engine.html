<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tellimations Engine Test</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: monospace;
      margin: 2rem;
    }
    canvas {
      border: 2px solid #444;
      display: block;
      margin-bottom: 1rem;
    }
    h1 { color: #66ccff; }
    h2 { color: #88ddaa; margin-top: 2rem; }
    .test { margin: 0.5rem 0; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    pre {
      background: #0d0d1a;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      max-height: 400px;
    }
    #results { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Tellimations Pixel Art Engine — Test</h1>

  <h2>Rendered Scene (280x180 @ 3x)</h2>
  <canvas id="scene"></canvas>

  <h2>Test Results</h2>
  <div id="results"></div>

  <h2>Entity Tree</h2>
  <pre id="tree"></pre>

  <h2>All Entity IDs</h2>
  <pre id="entities"></pre>

  <script src="engine.js"></script>
  <script>
    const results = document.getElementById('results');
    let passed = 0, failed = 0;

    function assert(condition, label) {
      const el = document.createElement('div');
      el.className = 'test';
      if (condition) {
        el.innerHTML = `<span class="pass">PASS</span> ${label}`;
        passed++;
      } else {
        el.innerHTML = `<span class="fail">FAIL</span> ${label}`;
        failed++;
      }
      results.appendChild(el);
    }

    // -----------------------------------------------------------------------
    // 1. Create buffer and draw a scene
    // -----------------------------------------------------------------------
    const buf = new PixelBuffer(560, 360);

    // Draw background
    const canvas = document.getElementById('scene');
    const renderer = new Renderer(canvas, buf, 1.5);
    renderer.drawBackground('forest');

    // Draw a snowman with hierarchical entity IDs
    // Body (bottom, middle, top)
    buf.circ(280, 300, 36, 255, 255, 255, 'snowman.body.bottom');
    buf.circ(280, 248, 28, 255, 255, 255, 'snowman.body.middle');
    buf.circ(280, 208, 20, 255, 255, 255, 'snowman.head');

    // Eyes
    buf.circ(272, 202, 2, 0, 0, 0, 'snowman.head.eyes.left');
    buf.circ(288, 202, 2, 0, 0, 0, 'snowman.head.eyes.right');

    // Nose (carrot)
    buf.tri(280, 208, 280, 212, 296, 210, 255, 140, 0, 'snowman.head.nose');

    // Hat
    buf.rect(262, 180, 36, 6, 40, 40, 40, 'snowman.hat.brim');
    buf.rect(268, 156, 24, 24, 40, 40, 40, 'snowman.hat.top');

    // Buttons on middle
    buf.circ(280, 240, 2, 0, 0, 0, 'snowman.body.middle.button1');
    buf.circ(280, 250, 2, 0, 0, 0, 'snowman.body.middle.button2');
    buf.circ(280, 260, 2, 0, 0, 0, 'snowman.body.middle.button3');

    // Arms (lines)
    buf.line(252, 248, 216, 230, 100, 70, 30, 'snowman.body.arm_left');
    buf.line(308, 248, 344, 230, 100, 70, 30, 'snowman.body.arm_right');

    // A tree on the right
    buf.rect(440, 200, 12, 60, 100, 70, 30, 'tree_01.trunk');
    buf.tri(400, 210, 490, 210, 446, 130, 34, 120, 34, 'tree_01.foliage');

    // A sun (top-left arc + circle)
    buf.circ(60, 50, 24, 255, 220, 50, 'sun');

    // Thick line test (scarf)
    buf.thickLine(260, 224, 310, 236, 6, 200, 30, 30, 'snowman.scarf');

    // Arc test (rainbow fragment)
    buf.arc(400, 80, 50, Math.PI, Math.PI * 1.5, 255, 0, 0, 'rainbow.red');
    buf.arc(400, 80, 54, Math.PI, Math.PI * 1.5, 255, 165, 0, 'rainbow.orange');

    // Ellipse test (pond)
    buf.ellip(140, 310, 50, 16, 50, 100, 200, 'pond');

    // Render
    renderer.render();

    // -----------------------------------------------------------------------
    // 2. Run tests
    // -----------------------------------------------------------------------

    // -- PixelBuffer basics --
    assert(buf.width === 560, 'Buffer width is 560');
    assert(buf.height === 360, 'Buffer height is 360');
    assert(buf.data.length === 560 * 360, 'Buffer has 560*360 pixels');

    // -- getPixel --
    const snowPx = buf.getPixel(280, 300);
    assert(snowPx.r === 255 && snowPx.g === 255 && snowPx.b === 255,
      'getPixel on snowman body returns white');
    assert(snowPx.e === 'snowman.body.bottom',
      'getPixel returns correct entity ID');

    const oob = buf.getPixel(-1, -1);
    assert(oob.r === 0 && oob.e === '', 'getPixel out-of-bounds returns empty');

    // -- getPixelsForPrefix --
    const allSnowman = buf.getPixelsForPrefix('snowman');
    assert(allSnowman.length > 0, 'getPixelsForPrefix("snowman") finds pixels');

    const headOnly = buf.getPixelsForPrefix('snowman.head');
    assert(headOnly.length > 0, 'getPixelsForPrefix("snowman.head") finds pixels');
    assert(headOnly.length < allSnowman.length,
      'head pixels < all snowman pixels');

    const leftEye = buf.getPixelsForPrefix('snowman.head.eyes.left');
    assert(leftEye.length > 0, 'getPixelsForPrefix finds deep nested entity');
    assert(leftEye.length < headOnly.length,
      'left eye pixels < head pixels');

    // Prefix must be exact boundary (dot-separated)
    const noPartial = buf.getPixelsForPrefix('snow');
    assert(noPartial.length === 0,
      'getPixelsForPrefix("snow") does NOT match "snowman" (no dot boundary)');

    // -- getEntityBounds --
    const hatBounds = buf.getEntityBounds('snowman.hat');
    assert(hatBounds !== null, 'getEntityBounds finds snowman.hat');
    assert(hatBounds.x1 <= 268 && hatBounds.x2 >= 290,
      'hat bounds span correct x range');
    assert(hatBounds.y1 <= 156 && hatBounds.y2 >= 180,
      'hat bounds span correct y range');

    const noBounds = buf.getEntityBounds('nonexistent');
    assert(noBounds === null, 'getEntityBounds returns null for missing entity');

    // -- snapshot / restore --
    buf.snapshot();
    const before = buf.getPixel(280, 300);
    assert(buf.data[300 * 560 + 280]._r === 255, 'snapshot stores _r');

    // Mutate a pixel
    buf.px(280, 300, 0, 0, 0, 'snowman.body.bottom');
    const after = buf.getPixel(280, 300);
    assert(after.r === 0, 'pixel mutated after snapshot');

    buf.restore();
    const restored = buf.getPixel(280, 300);
    assert(restored.r === 255, 'restore brings back _r values');

    // -- Renderer --
    assert(canvas.width === 840, 'Canvas width = 560 * 1.5 = 840');
    assert(canvas.height === 540, 'Canvas height = 360 * 1.5 = 540');

    // -- EntityRegistry --
    const registry = new EntityRegistry(buf);
    const allEntities = registry.getAllEntities();
    assert(allEntities.includes('snowman.head'), 'registry finds snowman.head');
    assert(allEntities.includes('tree_01.trunk'), 'registry finds tree_01.trunk');
    assert(allEntities.includes('sun'), 'registry finds sun');

    const tree = registry.getTree();
    assert(tree.snowman !== undefined, 'tree has snowman node');
    assert(tree.snowman.head !== undefined, 'tree has snowman.head node');
    assert(tree.snowman.head.eyes !== undefined, 'tree has snowman.head.eyes node');
    assert(tree.snowman.head.eyes.left !== undefined, 'tree has left eye node');

    const snowmanChildren = registry.getChildren('snowman');
    assert(snowmanChildren.includes('snowman.head'),
      'getChildren(snowman) includes snowman.head');
    assert(snowmanChildren.includes('snowman.body'),
      'getChildren(snowman) includes snowman.body');
    assert(snowmanChildren.includes('snowman.hat'),
      'getChildren(snowman) includes snowman.hat');
    assert(!snowmanChildren.includes('snowman.head.eyes'),
      'getChildren(snowman) does NOT include grandchildren');

    const rootChildren = registry.getChildren('');
    assert(rootChildren.includes('snowman'),
      'getChildren("") includes root-level snowman');
    assert(rootChildren.includes('tree_01'),
      'getChildren("") includes root-level tree_01');

    // -- executeSpriteCode --
    const testBuf = new PixelBuffer(10, 10);
    executeSpriteCode(`
      rect(0, 0, 5, 5, 200, 100, 50, 'test.block');
      circ(7, 7, 2, 100, 200, 100, 'test.dot');
    `, testBuf);
    const testPx = testBuf.getPixel(2, 2);
    assert(testPx.e === 'test.block',
      'executeSpriteCode draws rect with correct entity ID');
    const testDot = testBuf.getPixel(7, 7);
    assert(testDot.e === 'test.dot',
      'executeSpriteCode draws circ with correct entity ID');

    // Bad code should not throw
    executeSpriteCode('this is not valid javascript!!!', testBuf);
    assert(true, 'executeSpriteCode handles invalid code without crashing');

    // -----------------------------------------------------------------------
    // 3. Display entity info
    // -----------------------------------------------------------------------
    document.getElementById('tree').textContent = JSON.stringify(tree, null, 2);
    document.getElementById('entities').textContent = allEntities.join('\n');

    // Summary
    const summary = document.createElement('div');
    summary.style.marginTop = '1rem';
    summary.style.fontSize = '1.2em';
    summary.innerHTML = `<strong>${passed} passed, ${failed} failed</strong>`;
    summary.style.color = failed === 0 ? '#4caf50' : '#f44336';
    results.insertBefore(summary, results.firstChild);

    console.log('Entity tree:', tree);
    console.log('All entities:', allEntities);
    console.log(`Tests: ${passed} passed, ${failed} failed`);
  </script>
</body>
</html>
