<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
  <div class="story-container">
    <!-- Scene label -->
    <div class="story-scene-label">
      <a href="/study/landing" class="home-link">Back</a>
      <span class="label-sep">/</span>
      <span id="story-name">Story</span>
      <span class="label-sep">/</span>
      Scene <span id="scene-num">1</span> of <span id="scene-total">5</span>
    </div>

    <!-- Main scene canvas -->
    <div class="scene-canvas-wrapper">
      <canvas id="scene-canvas"></canvas>
    </div>

    <!-- Tutorial panel (visible only during tutorial on training scene 1) -->
    <div id="tutorial-panel" style="display:none">
      <div id="tutorial-text" class="tutorial-text"></div>
      <div id="tutorial-btns" class="tutorial-btn-row" style="display:none">
        <button class="btn-instr btn-instr-blue" id="btn-tutorial-replay">Replay</button>
        <button class="btn-instr btn-instr-green" id="btn-tutorial-continue">Continue</button>
      </div>
    </div>

    <!-- Controls row -->
    <div class="study-controls-row">
      <span id="ptt-hint" class="ptt-hint">Hold&nbsp; <kbd>Space</kbd> &nbsp;to speak</span>
      <button class="btn btn-red" id="btn-next-scene">Next Scene</button>
      <button class="btn btn-finish" id="btn-finish-story" style="display:none">Finish Story</button>
    </div>
  </div>

  <script src="/static/engine.js?v=3"></script>
  <script src="/static/animation_helpers.js?v=3"></script>
  <script src="/static/animation_templates.js?v=3"></script>
  <script src="/static/animations.js?v=3"></script>
  <script src="/static/narration.js?v=3"></script>
  <script src="/static/study_story.js?v=7"></script>
</body>
</html>
