<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations - Choose a Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="selection-container">
    <div class="sel-title" id="sel-title">Let's tell a <span class="accent">story</span> together!</div>
    <div class="sel-sub" id="sel-sub">Pick a scene to begin your adventure</div>

    <!-- Progress bar shown during generation -->
    <div class="progress-container" id="progress-container">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">Preparing your stories...</div>
    </div>

    <div class="thumbnails" id="thumbnails" style="display:none"></div>

    <div class="more-wrap">
      <button class="btn btn-ghost" id="btn-one-more" style="display:none">
        + I want to see one more
      </button>
    </div>
  </div>

  <script src="/static/engine.js?v=2"></script>
  <script src="/static/scene_picker.js?v=2"></script>
  <script src="/static/selection.js?v=2"></script>
</body>
</html>
