<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations - Choose a Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="selection-container">
    <div class="sel-title" id="sel-title">Let's tell a <span class="accent">story</span> together!</div>
    <div class="sel-sub" id="sel-sub">Pick a scene to begin your adventure</div>

    <!-- Progress bar shown during generation -->
    <div class="progress-container" id="progress-container">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">Preparing your stories...</div>
    </div>

    <div class="thumbnails" id="thumbnails" style="display:none"></div>

    <div class="more-wrap">
      <button class="btn btn-ghost" id="btn-one-more" style="display:none">
        + I want to see one more
      </button>
    </div>
  </div>

  <script src="/static/engine.js?v=2"></script>
  <script src="/static/scene_picker.js?v=2"></script>
  <script>
    (function() {
      const apiKey = sessionStorage.getItem('api_key');
      const participantId = sessionStorage.getItem('participant_id');
      const childAge = sessionStorage.getItem('child_age') || '8';
      if (!apiKey || !participantId) {
        window.location.href = '/';
        return;
      }

      const container = document.getElementById('thumbnails');
      const btnOneMore = document.getElementById('btn-one-more');
      const selTitle = document.getElementById('sel-title');
      const selSub = document.getElementById('sel-sub');
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const progressLabel = document.getElementById('progress-label');
      let branches = [];
      let fromDisk = false;

      // Track which scene indices have masks ready (clickable)
      var masksReadySet = {};
      // Map from scene index to its DOM card element
      var cardElements = {};
      // Timestamp when each card was appended (for minimum loading display)
      var cardAppendedAt = {};
      // Minimum time (ms) the loading state must be visible
      var MIN_LOADING_MS = 1500;
      // Queue of mask-ready events that arrived before the minimum delay
      var pendingMaskReady = {};

      // Step weights for progress calculation (% within a single scene)
      var stepWeights = {
        starting: 5,
        manifest: 20,
        images: 45,
        masks: 85,
        assembly: 95
      };

      var stepLabels = {
        starting: 'Getting creative...',
        manifest: 'Imagining a story...',
        images: 'Drawing the scene...',
        masks: 'Adding details...',
        assembly: 'Almost ready...'
      };

      // Track per-scene progress for parallel generation
      var sceneProgressMap = {};

      function updateProgress(sceneIndex, totalScenes, stepName) {
        // Store progress for this scene (scenes advance independently)
        sceneProgressMap[sceneIndex] = stepWeights[stepName] || 0;

        // Overall progress = average across all scenes
        var total = 0;
        for (var key in sceneProgressMap) {
          total += sceneProgressMap[key];
        }
        var overallPct = Math.min(total / totalScenes, 99);

        progressBar.style.width = overallPct + '%';
        var label = stepLabels[stepName] || 'Working...';
        progressLabel.textContent = label;
      }

      function showProgress() {
        progressContainer.style.display = '';
        container.style.display = 'none';
        progressBar.style.width = '2%';
        progressLabel.textContent = 'Preparing your stories...';
      }

      function hideProgress() {
        progressContainer.style.display = 'none';
        container.style.display = '';
      }

      // Connect WebSocket
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(
        protocol + '//' + location.host + '/ws'
        + '?api_key=' + encodeURIComponent(apiKey)
        + '&participant_id=' + encodeURIComponent(participantId)
        + '&child_age=' + encodeURIComponent(childAge)
      );

      ws.onopen = function() {
        showProgress();
        // Request initial scenes
        ws.send(JSON.stringify({ type: 'generate_initial_scenes' }));
      };

      ws.onmessage = function(event) {
        // Skip binary messages (TTS audio)
        if (event.data instanceof ArrayBuffer || event.data instanceof Blob) return;
        const msg = JSON.parse(event.data);

        if (msg.type === 'generation_progress') {
          // Scene generation started
          updateProgress(msg.scene_index, msg.total_scenes, 'manifest');
        }

        if (msg.type === 'generation_step') {
          // Pipeline step completed
          updateProgress(msg.scene_index, msg.total_scenes, msg.step);
        }

        if (msg.type === 'scene_ready') {
          // A single scene just finished generating — show it immediately (greyed out)
          branches.push(msg.scene);
          container.style.display = '';
          appendThumbnail(msg.scene, branches.length - 1, false);
        }

        if (msg.type === 'masks_ready') {
          // Masks generated for a scene — enable clicking
          // Enforce minimum loading display time so the user sees the greyed-out state
          var appearedAt = cardAppendedAt[msg.index];
          if (appearedAt) {
            var elapsed = Date.now() - appearedAt;
            if (elapsed < MIN_LOADING_MS) {
              (function(idx) {
                setTimeout(function() { enableThumbnail(idx); }, MIN_LOADING_MS - elapsed);
              })(msg.index);
            } else {
              enableThumbnail(msg.index);
            }
          } else {
            // Card not yet shown — queue it
            pendingMaskReady[msg.index] = true;
          }
        }

        if (msg.type === 'initial_scenes_done') {
          // All scenes finished generating
          hideProgress();
          btnOneMore.style.display = '';
        }

        if (msg.type === 'initial_scenes') {
          // Backward compat: bulk delivery (from-disk case)
          branches = msg.scenes;
          fromDisk = !!msg.from_disk;
          if (fromDisk) {
            selTitle.innerHTML = 'Welcome back! <span class="accent">Continue</span> a story';
            selSub.textContent = 'Pick a previous story to continue, or start a new one';
          }
          hideProgress();
          renderThumbnails(branches, true); // from-disk = masks already ready
          btnOneMore.style.display = fromDisk ? 'none' : '';
        }

        if (msg.type === 'one_more_scene') {
          branches.push(msg.scene);
          var newIdx = msg.index !== undefined ? msg.index : branches.length - 1;
          appendThumbnail(msg.scene, newIdx, false);
        }

        if (msg.type === 'scene_selected_ready') {
          // Server finished generating masks + features — navigate with updated scene
          sessionStorage.setItem('chosen_scene', JSON.stringify(msg.scene));
          sessionStorage.setItem('scene_index', String(pendingSelectIndex || 0));
          window.location.href = '/story';
        }

        if (msg.type === 'error') {
          console.error('Server error:', msg.message);
          hideProgress();
          // Reset pending selection
          if (pendingSelectIndex !== null) {
            var card = cardElements[pendingSelectIndex];
            if (card) {
              card.style.opacity = '';
              card.style.pointerEvents = '';
            }
            pendingSelectIndex = null;
          }
          container.style.display = '';
          container.innerHTML = '<p style="color:var(--red)">' + msg.message + '</p>';
        }
      };

      ws.onerror = function() {
        hideProgress();
        container.style.display = '';
        container.innerHTML = '<p style="color:var(--red)">Connection error. Please reload.</p>';
      };

      function appendThumbnail(scene, index, ready) {
        var card = ScenePicker.createThumbnailCard(scene);

        // Add a loading overlay with a spinning circle
        var overlay = document.createElement('div');
        overlay.className = 'thumb-loading-overlay';
        var spinner = document.createElement('div');
        spinner.className = 'thumb-spinner';
        overlay.appendChild(spinner);
        card.appendChild(overlay);

        if (ready) {
          // Already ready (from disk) — no loading state
          masksReadySet[index] = true;
          card.classList.remove('loading');
          overlay.style.display = 'none';
        } else {
          card.classList.add('loading');
          cardAppendedAt[index] = Date.now();
        }

        card.addEventListener('click', function() {
          if (masksReadySet[index]) {
            selectScene(index);
          }
        });

        cardElements[index] = card;
        container.appendChild(card);

        // If masks_ready arrived before scene_ready, schedule enable with min delay
        if (!ready && pendingMaskReady[index]) {
          delete pendingMaskReady[index];
          setTimeout(function() { enableThumbnail(index); }, MIN_LOADING_MS);
        }
      }

      function enableThumbnail(index) {
        masksReadySet[index] = true;
        var card = cardElements[index];
        if (card) {
          card.classList.remove('loading');
          // Hide the loading overlay
          var overlay = card.querySelector('.thumb-loading-overlay');
          if (overlay) overlay.style.display = 'none';
        }
      }

      function renderThumbnails(scenes, ready) {
        container.innerHTML = '';
        cardElements = {};
        scenes.forEach(function(scene, index) {
          appendThumbnail(scene, index, !!ready);
        });
      }

      var pendingSelectIndex = null;

      function selectScene(index) {
        if (!masksReadySet[index]) return; // safety check
        if (pendingSelectIndex !== null) return; // already selecting
        pendingSelectIndex = index;
        var scene = branches[index];
        // Store story_index if it came from disk
        if (scene._story_index) {
          sessionStorage.setItem('story_index', String(scene._story_index));
        } else {
          sessionStorage.removeItem('story_index');
        }
        // Show loading state on the selected card
        var card = cardElements[index];
        if (card) {
          card.style.opacity = '0.6';
          card.style.pointerEvents = 'none';
        }
        // Ask server to generate real masks + features, then wait for response
        ws.send(JSON.stringify({ type: 'select_scene', index: index }));
        // Navigation happens in onmessage when scene_selected_ready arrives
      }

      btnOneMore.addEventListener('click', function() {
        btnOneMore.disabled = true;
        btnOneMore.textContent = 'Generating...';
        ws.send(JSON.stringify({ type: 'generate_one_more' }));
        // Re-enable after response
        var origHandler = ws.onmessage;
        ws.onmessage = function(event) {
          origHandler(event);
          if (event.data instanceof ArrayBuffer || event.data instanceof Blob) return;
          var msg = JSON.parse(event.data);
          if (msg.type === 'one_more_scene' || msg.type === 'error') {
            btnOneMore.disabled = false;
            btnOneMore.textContent = '+ I want to see one more';
          }
        };
      });
    })();
  </script>
</body>
</html>
