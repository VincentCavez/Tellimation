<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations - Choose a Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
  <div class="falling-pixels-bg" id="falling-pixels"></div>
  <div class="selection-container">
    <div class="sel-title" id="sel-title">Let's tell a <span class="accent">story</span> together!</div>
    <div class="sel-sub" id="sel-sub">Pick a scene to begin your adventure</div>

    <!-- Progress bar shown during generation -->
    <div class="progress-container" id="progress-container">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-label" id="progress-label">Preparing your stories...</div>
    </div>

    <div class="thumbnails" id="thumbnails" style="display:none"></div>

    <div class="more-wrap">
      <button class="btn btn-ghost" id="btn-one-more" style="display:none">
        + I want to see one more
      </button>
    </div>
  </div>

  <script src="/static/engine.js?v=2"></script>
  <script src="/static/scene_picker.js?v=2"></script>
  <script src="/static/selection.js?v=2"></script>
  <script>
    // Falling pixels animation in margins
    const colors = ['#DB0038', '#F7C200', '#519DD9', '#53BAC1', '#EDEDED'];
    const pixelsContainer = document.getElementById('falling-pixels');
    let activePixels = 0;
    const maxPixels = 8;

    function createPixel() {
      if (activePixels >= maxPixels) return;

      const pixel = document.createElement('div');
      pixel.className = 'falling-pixel';

      const color = colors[Math.floor(Math.random() * colors.length)];
      pixel.style.backgroundColor = color;

      // Random x position (left or right margin)
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const x = side === 'left' ? Math.random() * 40 : 100 - Math.random() * 40;
      pixel.style.left = x + '%';
      pixel.style.top = '-20px';

      // Random duration (3-6s)
      const duration = 3 + Math.random() * 3;
      pixel.style.animation = `fall ${duration}s linear forwards`;

      pixelsContainer.appendChild(pixel);
      activePixels++;

      setTimeout(() => {
        pixel.remove();
        activePixels--;
      }, duration * 1000);
    }

    // Spawn pixels continuously
    setInterval(createPixel, 600);
  </script>
</body>
</html>
