<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations - Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="story-container">
    <!-- Scene label -->
    <div class="story-scene-label">
      <a href="/selection" class="home-link">Home</a>
      <span class="label-sep">/</span>
      Scene <span id="scene-num">1</span>
    </div>

    <!-- Main scene canvas -->
    <div class="scene-canvas-wrapper">
      <canvas id="scene-canvas"></canvas>
    </div>

    <!-- Transcription display (main box) -->
    <div class="transcription-box" id="transcription-box">
      <span class="transcription-text" id="transcription-feedback"></span>
    </div>

    <!-- Push-to-talk hint -->
    <div class="ptt-hint" id="ptt-hint">
      Hold <kbd>Space</kbd> to speak
    </div>

    <!-- Branch picker (hidden until scene complete) -->
    <div class="branch-picker" id="branch-picker" style="display:none">
      <h2>What happens next?</h2>
      <div class="thumbnails" id="branch-thumbnails">
        <div class="loading-overlay">
          <div class="loading-dots">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="loading-text">Creating new scenes...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/engine.js?v=2"></script>
  <script src="/static/animation_helpers.js?v=2"></script>
  <script src="/static/animation_templates.js?v=2"></script>
  <script src="/static/animations.js?v=2"></script>
  <script src="/static/scene_picker.js?v=2"></script>
  <script src="/static/narration.js?v=2"></script>
  <script src="/static/story.js?v=2"></script>
</body>
</html>
