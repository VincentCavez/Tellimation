<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <span class="t2">Tell</span><span class="t3">imations</span>
      </div>
      <div class="login-sub">AI-powered storytelling for speech therapy</div>

      <div class="field">
        <label for="participant-code">Participant Code</label>
        <input type="text" id="participant-code" placeholder="4-digit code" maxlength="4" autocomplete="off">
      </div>
      <div class="field">
        <label for="child-age">Child's Age</label>
        <select id="child-age">
          <option value="7">7</option>
          <option value="8" selected>8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
        </select>
      </div>
      <div class="login-btn-wrap">
        <button class="btn btn-red" id="btn-ok">Let's go!</button>
      </div>
    </div>
  </div>
  <script>
    const btnOk = document.getElementById('btn-ok');
    const codeInput = document.getElementById('participant-code');
    const ageSelect = document.getElementById('child-age');

    async function proceed() {
      const code = codeInput.value.trim();
      if (!code) { codeInput.focus(); return; }

      btnOk.disabled = true;
      try {
        const resp = await fetch('/api/validate-code', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({code})
        });
        if (!resp.ok) {
          alert('Incorrect code, please try again');
          codeInput.select();
          return;
        }
        sessionStorage.setItem('participant_id', code);
        sessionStorage.setItem('child_age', ageSelect.value);
        window.location.href = '/selection';
      } finally {
        btnOk.disabled = false;
      }
    }

    btnOk.addEventListener('click', proceed);
    codeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') proceed();
    });
  </script>
</body>
</html>
