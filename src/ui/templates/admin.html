<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellimations - Admin: Generate Default Scenes</title>
  <link rel="stylesheet" href="/static/style.css?v=7">
  <style>
    .admin-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
      width: 100%;
      max-width: 1200px;
    }
    .admin-title {
      font-size: 1.6rem;
      font-weight: 400;
      text-align: center;
    }
    .admin-title .accent { color: var(--yellow); }
    .admin-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      width: 100%;
    }
    .admin-card {
      background: var(--dark2);
      border: 2px solid var(--dark4);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .admin-card canvas {
      width: 100%;
      aspect-ratio: 14/9;
      border-radius: 10px;
      display: block;
      image-rendering: pixelated;
      background: var(--dark);
    }
    .admin-card .card-label {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--teal);
      font-weight: 500;
    }
    .admin-card .card-summary {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      line-height: 1.3;
      min-height: 2em;
    }
    .admin-card details {
      width: 100%;
      margin-top: 8px;
    }
    .admin-card details summary {
      font-size: 0.72rem;
      color: #666;
      cursor: pointer;
      user-select: none;
    }
    .admin-card details summary:hover { color: var(--teal); }
    .admin-card .manifest-json {
      margin-top: 6px;
      font-size: 0.6rem;
      color: #888;
      background: var(--dark);
      border-radius: 8px;
      padding: 8px;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
    }
    .admin-card.generating {
      opacity: 0.5;
    }
    .admin-card.generating::after {
      content: 'Generating...';
      font-size: 0.75rem;
      color: var(--yellow);
      margin-top: 4px;
    }
    .admin-card.ready {
      border-color: var(--teal);
    }
    .admin-card.excluded {
      border-color: var(--dark4);
      opacity: 0.4;
    }
    .admin-card.error {
      border-color: var(--red);
    }
    .admin-card .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      width: 100%;
    }
    .admin-card .card-actions button {
      flex: 1;
      font-size: 0.65rem;
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid var(--dark4);
      background: var(--dark);
      color: #aaa;
      cursor: pointer;
    }
    .admin-card .card-actions button:hover {
      border-color: var(--teal);
      color: var(--teal);
    }
    .admin-card .card-actions .btn-exclude {
      color: var(--red);
      border-color: transparent;
    }
    .admin-card .card-actions .btn-exclude:hover {
      border-color: var(--red);
    }
    .admin-status {
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }
    @media (max-width: 800px) {
      .admin-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-title">Generate <span class="accent">Default Scenes</span></div>
    <div class="admin-status" id="status">Generate 9 scenes, review them, then download or save.</div>

    <div class="admin-controls">
      <button class="btn btn-red" id="btn-generate">Generate 9 Scenes</button>
      <button class="btn btn-ghost" id="btn-download" style="display:none">Download Selected (JSON)</button>
      <button class="btn btn-ghost" id="btn-save" style="display:none">Save Selected to Server</button>
    </div>

    <div class="admin-grid" id="grid"></div>
  </div>

  <script src="/static/engine.js?v=2"></script>
  <script src="/static/scene_picker.js?v=2"></script>
  <script>
  (function() {
    var grid = document.getElementById('grid');
    var btnGenerate = document.getElementById('btn-generate');
    var btnDownload = document.getElementById('btn-download');
    var btnSave = document.getElementById('btn-save');
    var statusEl = document.getElementById('status');
    var scenes = [];
    var cards = [];
    var ws = null;
    var totalExpected = 9;
    var doneCount = 0;

    // Create 9 empty card slots
    function initGrid() {
      grid.innerHTML = '';
      cards = [];
      scenes = [];
      doneCount = 0;
      for (var i = 0; i < totalExpected; i++) {
        var card = document.createElement('div');
        card.className = 'admin-card generating';
        card.innerHTML =
          '<canvas></canvas>' +
          '<div class="card-label">Scene ' + (i + 1) + '</div>' +
          '<div class="card-summary"></div>';
        grid.appendChild(card);
        cards.push(card);
      }
    }

    function renderThumbnailInCard(card, scene) {
      var canvas = card.querySelector('canvas');
      var spriteCode = scene.sprite_code || {};
      var bgEntry = spriteCode.bg || null;
      var entityEids = [];
      for (var eid in spriteCode) {
        if (spriteCode.hasOwnProperty(eid) && eid !== 'bg') {
          entityEids.push(eid);
        }
      }
      var entities = (scene.manifest && scene.manifest.entities) || [];
      var depthMap = {};
      for (var di = 0; di < entities.length; di++) {
        var de = entities[di];
        depthMap[de.id] = (de.position && de.position.depth_order != null) ? de.position.depth_order : 0;
      }
      entityEids.sort(function(a, b) { return (depthMap[a] || 0) - (depthMap[b] || 0); });

      function renderToCanvas(fullBuf) {
        fullBuf.snapshotBackground();
        for (var i = 0; i < entityEids.length; i++) {
          try { renderSpriteEntry(entityEids[i], spriteCode[entityEids[i]], fullBuf); }
          catch (e) { console.warn('Failed to render', entityEids[i], e); }
        }
        // Downsample to thumbnail size
        var THUMB_PW = ScenePicker.THUMB_PW;
        var THUMB_PH = ScenePicker.THUMB_PH;
        var thumbBuf = new PixelBuffer(THUMB_PW, THUMB_PH);
        for (var ty = 0; ty < THUMB_PH; ty++) {
          for (var tx = 0; tx < THUMB_PW; tx++) {
            var sx = tx * 2, sy = ty * 2;
            var tr = 0, tg = 0, tb = 0, count = 0;
            for (var dy = 0; dy < 2; dy++) {
              for (var dx = 0; dx < 2; dx++) {
                var fi = (sy + dy) * fullBuf.width + (sx + dx);
                if (fi < fullBuf.data.length) {
                  tr += fullBuf.data[fi].r; tg += fullBuf.data[fi].g; tb += fullBuf.data[fi].b;
                  count++;
                }
              }
            }
            if (count > 0) {
              var ti = ty * THUMB_PW + tx;
              thumbBuf.data[ti].r = Math.round(tr / count);
              thumbBuf.data[ti].g = Math.round(tg / count);
              thumbBuf.data[ti].b = Math.round(tb / count);
            }
          }
        }
        canvas.width = THUMB_PW;
        canvas.height = THUMB_PH;
        canvas.style.imageRendering = 'pixelated';
        var ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        var imgData = ctx.createImageData(THUMB_PW, THUMB_PH);
        var px = imgData.data;
        for (var idx = 0; idx < THUMB_PW * THUMB_PH; idx++) {
          var p = thumbBuf.data[idx];
          var off = idx * 4;
          px[off] = p.r; px[off+1] = p.g; px[off+2] = p.b; px[off+3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);
      }

      var fullBuf = new PixelBuffer(PW, PH);
      if (bgEntry && bgEntry.format === 'image_background') {
        var p = executeImageBackground(bgEntry, fullBuf);
        if (p && typeof p.then === 'function') {
          p.then(function() { renderToCanvas(fullBuf); });
        } else {
          renderToCanvas(fullBuf);
        }
      } else {
        if (bgEntry) {
          try { renderSpriteEntry('bg', bgEntry, fullBuf); } catch(e) {}
        }
        renderToCanvas(fullBuf);
      }
    }

    var excluded = {};  // index -> true if excluded

    function populateCard(index, scene) {
      var card = cards[index];
      card.className = 'admin-card ready';
      // Summary
      card.querySelector('.card-summary').textContent =
        scene.branch_summary || scene.narrative_text || '';
      // Render thumbnail
      renderThumbnailInCard(card, scene);
      // Action buttons
      var actions = document.createElement('div');
      actions.className = 'card-actions';
      var dlBtn = document.createElement('button');
      dlBtn.textContent = 'Download';
      dlBtn.addEventListener('click', function() { downloadScene(index); });
      var exBtn = document.createElement('button');
      exBtn.className = 'btn-exclude';
      exBtn.textContent = 'Exclude';
      exBtn.addEventListener('click', function() { toggleExclude(index); });
      actions.appendChild(dlBtn);
      actions.appendChild(exBtn);
      card.appendChild(actions);
      // Add manifest details
      var details = document.createElement('details');
      var summary = document.createElement('summary');
      summary.textContent = 'Show manifest (' + ((scene.manifest && scene.manifest.entities) || []).length + ' entities)';
      details.appendChild(summary);
      var pre = document.createElement('div');
      pre.className = 'manifest-json';
      pre.textContent = JSON.stringify(scene.manifest, null, 2);
      details.appendChild(pre);
      card.appendChild(details);
    }

    function downloadScene(index) {
      var scene = scenes[index];
      if (!scene) return;
      var blob = new Blob([JSON.stringify(scene, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'scene_' + (index + 1) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function toggleExclude(index) {
      var card = cards[index];
      if (excluded[index]) {
        delete excluded[index];
        card.className = 'admin-card ready';
        card.querySelector('.btn-exclude').textContent = 'Exclude';
      } else {
        excluded[index] = true;
        card.className = 'admin-card excluded';
        card.querySelector('.btn-exclude').textContent = 'Include';
      }
      updateSelectedCount();
    }

    function getSelectedScenes() {
      var selected = [];
      for (var i = 0; i < scenes.length; i++) {
        if (!excluded[i]) selected.push(scenes[i]);
      }
      return selected;
    }

    function updateSelectedCount() {
      var sel = getSelectedScenes();
      var total = scenes.length;
      var count = sel.length;
      if (count < total) {
        statusEl.textContent = count + ' / ' + total + ' scenes selected. Review, then download or save.';
      } else {
        statusEl.textContent = total + ' scenes ready. Review, then download or save.';
      }
    }

    function markError(index, message) {
      var card = cards[index];
      card.className = 'admin-card error';
      card.querySelector('.card-summary').textContent = 'Error: ' + message;
    }

    // -- Generate --
    btnGenerate.addEventListener('click', function() {
      btnGenerate.disabled = true;
      btnGenerate.textContent = 'Generating...';
      btnDownload.style.display = 'none';
      btnSave.style.display = 'none';
      statusEl.textContent = 'Generating 9 scenes... This may take a few minutes.';
      initGrid();

      var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(
        protocol + '//' + location.host + '/ws'
        + '?participant_id=admin&child_age=8'
      );

      ws.onopen = function() {
        ws.send(JSON.stringify({ type: 'generate_initial_scenes', count: totalExpected }));
      };

      ws.onmessage = function(event) {
        if (event.data instanceof ArrayBuffer || event.data instanceof Blob) return;
        var msg = JSON.parse(event.data);

        if (msg.type === 'generation_step') {
          var idx = msg.scene_index || 0;
          if (cards[idx]) {
            var label = cards[idx].querySelector('.card-label');
            var stepNames = {
              manifest: 'Imagining...',
              images: 'Drawing...',
              masks: 'Details...',
              assembly: 'Almost...'
            };
            label.textContent = 'Scene ' + (idx + 1) + ' — ' + (stepNames[msg.step] || msg.step);
          }
        }

        if (msg.type === 'scene_ready') {
          scenes.push(msg.scene);
          var idx = scenes.length - 1;
          populateCard(idx, msg.scene);
          statusEl.textContent = scenes.length + ' / ' + totalExpected + ' scenes ready';
        }

        if (msg.type === 'initial_scenes_done') {
          btnGenerate.disabled = false;
          btnGenerate.textContent = 'Regenerate All';
          if (scenes.length > 0) {
            btnDownload.style.display = '';
            btnSave.style.display = '';
            statusEl.textContent = scenes.length + ' scenes ready. Review, then download or save.';
          }
          ws.close();
        }

        if (msg.type === 'error') {
          console.error(msg.message);
          statusEl.textContent = 'Error: ' + msg.message;
        }
      };

      ws.onerror = function() {
        statusEl.textContent = 'WebSocket error. Check console.';
        btnGenerate.disabled = false;
        btnGenerate.textContent = 'Generate 9 Scenes';
      };
    });

    // -- Download (selected only) --
    btnDownload.addEventListener('click', function() {
      var selected = getSelectedScenes();
      if (selected.length === 0) {
        statusEl.textContent = 'No scenes selected to download.';
        return;
      }
      var blob = new Blob([JSON.stringify(selected, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'default_scenes.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    // -- Save to server (selected only) --
    btnSave.addEventListener('click', function() {
      var selected = getSelectedScenes();
      if (selected.length === 0) {
        statusEl.textContent = 'No scenes selected to save.';
        return;
      }
      btnSave.disabled = true;
      btnSave.textContent = 'Saving...';
      fetch('/api/save-default-scenes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenes: selected }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.ok) {
          statusEl.textContent = 'Saved ' + selected.length + ' scenes to server.';
          btnSave.textContent = 'Saved!';
        } else {
          statusEl.textContent = 'Save failed: ' + (data.error || 'unknown error');
          btnSave.textContent = 'Save to Server';
        }
        btnSave.disabled = false;
      })
      .catch(function(err) {
        statusEl.textContent = 'Save failed: ' + err.message;
        btnSave.textContent = 'Save to Server';
        btnSave.disabled = false;
      });
    });
  })();
  </script>
</body>
</html>
